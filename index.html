<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>健康射擊對戰：30關生存挑戰</title>
<style>
  body {
    margin: 0;
    background: #000;
    background-image: radial-gradient(circle, #1a1a2e, #000);
    color: white;
    font-family: '微軟正黑體', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* 頂部 UI */
  #ui {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    z-index: 100;
  }

  .bar-wrapper { width: 40%; text-align: center; }
  .name-tag { font-size: 28px; font-weight: bold; margin-bottom: 5px; color: #ffcc00; text-shadow: 2px 2px 4px #000; }
  .bar { height: 35px; background: #222; border: 4px solid #fff; border-radius: 10px; overflow: hidden; }
  .hp { height: 100%; width: 100%; transition: width 0.4s ease-out; }
  #heroHP { background: linear-gradient(to right, #00ff88, #008855); }
  #monsterHP { background: linear-gradient(to right, #ff4444, #880000); }

  /* 戰鬥區：嚴格左右各一隻 */
  #arena {
    position: relative;
    width: 100vw;
    height: calc(100vh - 250px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    box-sizing: border-box;
  }

  /* 角色巨大化設定 */
  .character {
    width: 600px; 
    height: 600px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    image-rendering: pixelated;
    position: relative;
  }

  /* 英雄 - 拿槍/劍的姿態 */
  #hero {
    background-image: url('https://raw.githubusercontent.com/chriscourses/fighting-game/main/img/samuraiMack/Attack1.png');
  }

  /* 怪物 - 拿武器的姿態 */
  #monster {
    background-image: url('https://raw.githubusercontent.com/chriscourses/fighting-game/main/img/kenji/Attack1.png');
    transform: scaleX(-1);
  }

  /* 受擊特效 */
  .hit { filter: brightness(5) contrast(2) !important; transition: 0.1s; }

  /* 子彈 */
  .bullet {
    width: 45px;
    height: 12px;
    background: #fff;
    position: absolute;
    border-radius: 6px;
    box-shadow: 0 0 20px #fff, 0 0 40px #00ffff;
    z-index: 50;
  }

  /* 題目區 */
  #questionContainer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 250px;
    background: rgba(0, 0, 0, 0.9);
    border-top: 6px solid #ffcc00;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }

  #question { font-size: 30px; margin-bottom: 20px; color: #fff; font-weight: bold; }
  .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 900px; margin: 0 auto; }
  
  button {
    padding: 15px;
    font-size: 22px;
    cursor: pointer;
    background: #333;
    color: white;
    border: 3px solid #666;
    border-radius: 12px;
    transition: 0.2s;
  }

  button:hover { background: #ffcc00; color: #000; border-color: #fff; transform: translateY(-3px); }

  /* 啟動封面 */
  #cover {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #000; display:flex; flex-direction:column;
    justify-content:center; align-items:center; z-index:999;
  }
</style>
</head>
<body>

<div id="cover">
  <h1 style="font-size: 50px; color: #ffcc00;">健康射擊：生存戰</h1>
  <p style="font-size: 20px;">答對英雄射擊，答錯怪物射擊！</p>
  <button onclick="startGame()" style="padding: 20px 60px; font-size: 30px; background: #ffcc00; color: #000;">開始遊戲</button>
</div>

<!-- 音樂與音效 -->
<audio id="bgm" src="https://cdn.pixabay.com/audio/2024/04/12/audio_104f76231c.mp3" loop></audio>
<audio id="shootSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_49b1d9.mp3"></audio>
<audio id="hitSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c6ccf4.mp3"></audio>

<div id="ui">
  <div class="bar-wrapper">
    <div class="name-tag">HERO</div>
    <div class="bar"><div id="heroHP" class="hp"></div></div>
  </div>
  <div class="bar-wrapper">
    <div class="name-tag">MONSTER</div>
    <div class="bar"><div id="monsterHP" class="hp"></div></div>
  </div>
</div>

<div id="arena">
  <div id="hero" class="character"></div>
  <div id="monster" class="character"></div>
</div>

<div id="questionContainer">
  <div id="question">載入中...</div>
  <div id="choices" class="btn-group"></div>
</div>

<script>
let hHP = 100, mHP = 100;

// ✅ 100% 採用你提供的 30 題，絕不重複
const questions = [
  {q:"睡眠不足最直接影響什麼？",a:["記憶力下降","視力變好","身高增加","免疫提升"],c:0},
  {q:"成人建議睡眠時間？",a:["3-4小時","5-6小時","7-9小時","12小時以上"],c:2},
  {q:"有氧運動例子？",a:["跑步","舉重","冥想","睡覺"],c:0},
  {q:"無氧運動例子？",a:["短跑","慢跑","游泳","散步"],c:0},
  {q:"心跳正常範圍？",a:["20-40","60-100","120-140","150-180"],c:1},
  {q:"血壓過高稱為？",a:["低血壓","高血壓","貧血","糖尿病"],c:1},
  {q:"維生素C主要功能？",a:["抗氧化","增加脂肪","降低水分","升高血壓"],c:0},
  {q:"鈣主要作用？",a:["骨骼","消化","呼吸","視力"],c:0},
  {q:"鐵不足會？",a:["貧血","肥胖","高血壓","失明"],c:0},
  {q:"蛋白質主要功能？",a:["修復組織","供糖","供脂肪","供鹽"],c:0},
  {q:"水分不足會？",a:["脫水","變高","變胖","變強"],c:0},
  {q:"每日建議喝水？",a:["500ml","1000ml","2000ml","4000ml"],c:2},
  {q:"高鹽飲食會導致？",a:["高血壓","低血壓","近視","骨折"],c:0},
  {q:"高糖飲食會？",a:["蛀牙","變健康","長高","增肌"],c:0},
  {q:"肥胖風險？",a:["心臟病","視力提升","骨頭變強","免疫上升"],c:0},
  {q:"吸菸主要傷害？",a:["肺","骨","皮膚","胃"],c:0},
  {q:"運動頻率建議？",a:["每週5天","每月1天","不運動","一年一次"],c:0},
  {q:"久坐影響？",a:["代謝下降","變高","變瘦","變聰明"],c:0},
  {q:"水果主要提供？",a:["維生素","脂肪","鹽","咖啡因"],c:0},
  {q:"蔬菜主要作用？",a:["纖維","糖","油","酒精"],c:0},
  {q:"睡前滑手機影響？",a:["失眠","變健康","長高","強壯"],c:0},
  {q:"壓力過大會？",a:["焦慮","變強","變高","變瘦"],c:0},
  {q:"心理健康包含？",a:["情緒穩定","只睡覺","不吃飯","不喝水"],c:0},
  {q:"洗手重要時機？",a:["吃飯前","只早上","只晚上","不需要"],c:0},
  {q:"運動前需要？",a:["熱身","喝酒","抽菸","熬夜"],c:0},
  {q:"肌肉來源？",a:["蛋白質","糖","鹽","水"],c:0},
  {q:"骨骼健康需要？",a:["鈣","糖","油","咖啡"],c:0},
  {q:"缺乏運動會？",a:["肥胖","長高","變聰明","視力提升"],c:0},
  {q:"喝酒過量會傷？",a:["肝臟","眼睛","耳朵","骨頭"],c:0},
  {q:"熬夜影響？",a:["免疫下降","變健康","長高","變強"],c:0}
];

let activeQuestions = [...questions]; // 複製一份題目來操作

function startGame() {
  document.getElementById("cover").style.display = "none";
  const bgm = document.getElementById("bgm");
  bgm.volume = 1.0; // 音量最大化
  bgm.play();
  nextRound();
}

function nextRound() {
  if (activeQuestions.length === 0) {
    alert("恭喜破關！你已回答完所有健康知識題！");
    location.reload();
    return;
  }

  // 隨機抽取一題並從清單中移除，確保不重複
  const randomIndex = Math.floor(Math.random() * activeQuestions.length);
  const currentQ = activeQuestions.splice(randomIndex, 1)[0];

  document.getElementById("question").innerText = currentQ.q;
  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  currentQ.a.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => handleAnswer(i === currentQ.c);
    choicesDiv.appendChild(btn);
  });
}

function handleAnswer(isCorrect) {
  if (isCorrect) {
    shoot(true); // 英雄射擊
  } else {
    shoot(false); // 怪物射擊
  }
  // 延遲載入下一題，等待動畫完成
  setTimeout(nextRound, 1000);
}

function shoot(isHero) {
  document.getElementById("shootSound").play();
  const bullet = document.createElement("div");
  bullet.className = "bullet";
  document.body.appendChild(bullet);

  const heroEl = document.getElementById("hero");
  const monsterEl = document.getElementById("monster");
  
  // 根據角色位置發射子彈
  let startX = isHero ? 450 : window.innerWidth - 450;
  let startY = window.innerHeight / 2 + 50; 
  bullet.style.left = startX + "px";
  bullet.style.top = startY + "px";

  let x = startX;
  const move = setInterval(() => {
    x += isHero ? 35 : -35;
    bullet.style.left = x + "px";

    // 擊中判定
    if (x > window.innerWidth - 450 || x < 450) {
      clearInterval(move);
      bullet.remove();
      document.getElementById("hitSound").play();
      
      if (isHero) {
        mHP -= 20;
        monsterEl.classList.add("hit");
        setTimeout(() => monsterEl.classList.remove("hit"), 150);
      } else {
        hHP -= 20;
        heroEl.classList.add("hit");
        setTimeout(() => heroEl.classList.remove("hit"), 150);
      }
      
      updateHP();
    }
  }, 20);
}

function updateHP() {
  document.getElementById("heroHP").style.width = hHP + "%";
  document.getElementById("monsterHP").style.width = mHP + "%";

  if (hHP <= 0) {
    alert("你被擊倒了！要多注意健康知識喔！");
    location.reload();
  }
  if (mHP <= 0) {
    alert("擊敗大魔王！進入下一階段！");
    mHP = 100; // 重置怪物血量繼續答題直到30題結束
    updateHP();
  }
}
</script>

</body>
</html>
